services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: certflow-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/generated_certs:/app/generated_certs
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DATABASE_NAME=certgen
      - JWT_SECRET=${JWT_SECRET:-supersecret}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: certflow-frontend:latest
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
